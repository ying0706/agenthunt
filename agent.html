<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent 详情 · AgentHunt</title>
  <script>if(window.innerWidth<901){document.write('<style>.sidebar{display:none!important}.page-body{display:block!important}</style>');}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:     #5B45FF;
      --brand-lt:  #EEF0FF;
      --brand-dk:  #4232CC;
      --orange:    #FF6B35;
      --green:     #22C55E;
      --bg:        #F4F5FA;
      --surface:   #FFFFFF;
      --border:    #E8E9F0;
      --text:      #1A1A2E;
      --text-2:    #5A5A7A;
      --text-3:    #9090A8;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ─── NAV ─────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; height: 60px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      height: 100%; padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .logo {
      font-size: 18px; font-weight: 800; color: var(--brand);
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .logo-icon {
      width: 28px; height: 28px; background: var(--brand); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-3);
    }
    .breadcrumb a { color: var(--text-2); transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--brand); }
    .nav-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; }
    .btn-ghost { background: transparent; color: var(--text-2); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dk); transform: translateY(-1px); }
    .nav-user { position: relative; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand); color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      border: 2px solid transparent; transition: border-color .15s;
    }
    .user-avatar:hover { border-color: var(--brand-lt); }
    .nav-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: var(--shadow-lg);
      min-width: 160px; overflow: hidden; display: none; z-index: 200;
    }
    .nav-user .nav-dropdown.open { display: block; }
    .dropdown-item {
      padding: 10px 16px; font-size: 13px; color: var(--text-2); transition: background .15s;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      border: none; background: none; width: 100%; text-align: left;
    }
    .dropdown-item:hover { background: var(--bg); color: var(--text); }
    .dropdown-item.danger:hover { background: #FFF0F0; color: #DC2626; }
    .dropdown-divider { height: 1px; background: var(--border); }

    /* ─── HERO BANNER ─────────── */
    .detail-hero {
      background: linear-gradient(135deg, #5B45FF 0%, #8B6FFF 100%);
      padding: 40px 24px 0;
    }
    .detail-hero-inner {
      max-width: 1100px; margin: 0 auto;
    }
    .detail-hero-top {
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px;
    }
    .detail-icon {
      width: 80px; height: 80px; border-radius: 18px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .detail-meta { flex: 1; color: #fff; }
    .detail-badges { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .detail-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    }
    .badge-cat { background: rgba(255,255,255,0.2); color: #fff; }
    .badge-new { background: #FFF3CD; color: #B45309; }
    .badge-hot { background: #FFE4E1; color: #DC2626; }
    .badge-featured { background: rgba(255,255,255,0.95); color: var(--brand); }
    .detail-name {
      font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
      color: #fff; margin-bottom: 8px;
    }
    .detail-tagline { font-size: 16px; color: rgba(255,255,255,0.85); line-height: 1.5; }

    /* Hero actions row */
    .detail-hero-actions {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .btn-use {
      padding: 11px 28px; border-radius: 10px;
      background: #fff; color: var(--brand);
      font-size: 15px; font-weight: 700; border: none;
      transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .btn-use:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .vote-hero-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
      color: #fff; font-size: 14px; font-weight: 700;
      transition: all 0.15s; backdrop-filter: blur(4px);
    }
    .vote-hero-btn:hover, .vote-hero-btn.voted {
      background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.7);
    }
    .vote-hero-btn.voted { background: rgba(255,255,255,0.3); }
    .btn-share {
      padding: 10px 16px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent; color: rgba(255,255,255,0.8);
      font-size: 14px; transition: all 0.15s;
    }
    .btn-share:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* Screenshot strip */
    .screenshot-strip {
      display: flex; gap: 12px; padding: 24px 0 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .screenshot-strip::-webkit-scrollbar { display: none; }
    .screenshot-item {
      flex-shrink: 0; width: 280px; height: 160px;
      border-radius: 10px 10px 0 0;
      border: 1px solid rgba(255,255,255,0.2);
      border-bottom: none;
      overflow: hidden; cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }
    .screenshot-item:hover { transform: translateY(-3px); }
    .screenshot-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .screenshot-placeholder .icon { font-size: 28px; }

    /* ─── MAIN LAYOUT ─────────── */
    /* 移动优先：默认单列 */
    .page-body {
      max-width: 1100px; margin: 0 auto;
      padding: 16px;
      display: block;
    }
    @media (min-width: 901px) {
      .page-body {
        padding: 28px 24px;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 28px;
      }
    }

    /* ─── CONTENT SECTIONS ────── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Description */
    .desc-text {
      font-size: 14px; color: var(--text-2); line-height: 1.8;
    }
    .desc-text p { margin-bottom: 12px; }
    .desc-text p:last-child { margin-bottom: 0; }
    .feature-list {
      list-style: none; display: flex; flex-direction: column; gap: 10px;
      margin-top: 16px;
    }
    .feature-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 14px; color: var(--text-2); line-height: 1.5;
    }
    .feature-icon {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--brand-lt); color: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; margin-top: 1px;
    }

    /* Tags */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      background: var(--bg); color: var(--text-2);
      border: 1px solid var(--border); transition: all 0.15s; cursor: pointer;
    }
    .tag:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-lt); }

    /* ─── COMMENTS ────────────── */
    .comment-input-wrap {
      display: flex; gap: 12px; margin-bottom: 24px;
      align-items: flex-start;
    }
    .comment-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-3);
    }
    .comment-avatar.user {
      background: var(--brand); color: #fff; font-size: 13px; font-weight: 700;
    }
    .comment-input-box { flex: 1; }
    .comment-textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 13px; color: var(--text); font-family: inherit;
      resize: none; outline: none; transition: border-color 0.2s;
      min-height: 42px; max-height: 120px;
    }
    .comment-textarea:focus { border-color: var(--brand); min-height: 80px; }
    .comment-textarea::placeholder { color: var(--text-3); }
    .comment-actions {
      display: flex; justify-content: flex-end; margin-top: 8px; gap: 8px;
    }
    .btn-sm {
      padding: 6px 14px; border-radius: 7px;
      font-size: 12px; font-weight: 600; border: none; transition: all 0.15s;
    }
    .btn-sm-ghost { background: transparent; color: var(--text-2); }
    .btn-sm-ghost:hover { background: var(--bg); }
    .btn-sm-primary { background: var(--brand); color: #fff; }
    .btn-sm-primary:hover { background: var(--brand-dk); }

    /* Comment list */
    .comment-list { display: flex; flex-direction: column; gap: 20px; }
    .comment-item { display: flex; gap: 12px; }
    .comment-body { flex: 1; }
    .comment-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
    }
    .comment-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .comment-time { font-size: 11px; color: var(--text-3); }
    .comment-role {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: var(--brand-lt); color: var(--brand); font-weight: 600;
    }
    .comment-text { font-size: 13px; color: var(--text-2); line-height: 1.6; }
    .comment-like {
      display: flex; align-items: center; gap: 4px; margin-top: 8px;
      font-size: 11px; color: var(--text-3); cursor: pointer;
      transition: color 0.15s;
    }
    .comment-like:hover { color: var(--brand); }
    .comment-divider {
      height: 1px; background: var(--border); margin: 4px 0;
    }
    .comment-count {
      font-size: 12px; color: var(--text-3); margin-bottom: 16px;
    }

    /* ─── SIDEBAR ─────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 18px; }
    .sidebar-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .sidebar-title {
      font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px;
    }

    /* Info list */
    .info-list { display: flex; flex-direction: column; gap: 10px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px;
    }
    .info-label { color: var(--text-3); }
    .info-value { color: var(--text); font-weight: 600; }
    .info-value a { color: var(--brand); }

    /* Creator card */
    .creator-info {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    .creator-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), #8B6FFF);
      color: #fff; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .creator-name { font-size: 14px; font-weight: 700; }
    .creator-bio { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .creator-agents { font-size: 12px; color: var(--text-2); }
    .btn-follow {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1.5px solid var(--brand); background: transparent;
      color: var(--brand); font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .btn-follow:hover { background: var(--brand-lt); }
    .btn-follow.following { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Related agents */
    .related-list { display: flex; flex-direction: column; gap: 10px; }
    .related-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 9px; cursor: pointer; transition: background 0.15s;
      border: 1px solid transparent;
    }
    .related-item:hover { background: var(--bg); border-color: var(--border); }
    .related-icon {
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .related-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .related-votes { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* Stats in sidebar */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-box {
      background: var(--bg); border-radius: 9px; padding: 12px;
      text-align: center;
    }
    .stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
    .stat-key { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* ─── MODALS ──────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,30,0.5);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg);
      width: 100%; max-width: 420px;
      transform: translateY(20px); transition: transform 0.2s; overflow: hidden;
    }
    .modal-overlay.open .modal { transform: none; }
    .modal-header {
      padding: 24px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 18px; font-weight: 800; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 8px;
      border: none; background: var(--bg); color: var(--text-2);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .modal-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600;
      color: var(--text-2); border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
    }
    .modal-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 14px; color: var(--text); background: var(--surface);
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--brand); }
    .form-input::placeholder { color: var(--text-3); }
    .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    .btn-full {
      width: 100%; padding: 11px; background: var(--brand); color: #fff;
      border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
      transition: all 0.15s; margin-top: 4px;
    }
    .btn-full:hover { background: var(--brand-dk); transform: translateY(-1px); }
    .form-footer { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 14px; }
    .form-footer a { color: var(--brand); font-weight: 600; }

    /* Screenshot modal */
    .screenshot-modal { max-width: 720px; }
    .screenshot-full {
      width: 100%; border-radius: 10px; overflow: hidden;
      min-height: 360px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── TOAST ───────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
      transform: translateY(80px); opacity: 0; transition: all 0.3s;
    }
    .toast.show { transform: none; opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: #EF4444; }

    /* ─── FOOTER ──────────────── */
    footer {
      border-top: 1px solid var(--border); padding: 28px 24px;
      text-align: center; font-size: 12px; color: var(--text-3); margin-top: 12px;
    }
    footer a { color: var(--brand); }

    /* ─── RESPONSIVE ──────────── */
    @media (max-width: 900px) {
      /* Nav */
      .nav-inner { padding: 0 16px !important; gap: 8px !important; }
      .breadcrumb { font-size: 12px !important; }
      #navActions { gap: 6px !important; }
      #navActions button { padding: 6px 10px !important; font-size: 12px !important; }

      /* Hero banner */
      .detail-hero { padding: 20px 16px 24px !important; }
      .detail-hero-inner { padding: 0 !important; }
      .detail-hero-top { flex-wrap: wrap !important; gap: 12px !important; }
      .detail-name { font-size: 22px !important; }
      .detail-hero-actions { gap: 8px !important; }
      .detail-hero-actions .btn-vote { min-width: unset !important; }

      /* Main layout: single column */
      .page-body { grid-template-columns: 1fr !important; padding: 16px !important; gap: 20px !important; }

      /* Sidebar stacks below */
      .sidebar { order: 2 !important; }

      /* Screenshots */
      .screenshot-item { width: 220px !important; height: 130px !important; }

      /* Use cases grid → single column */
      #useCases { grid-template-columns: 1fr !important; }

      /* Footer */
      footer { padding: 20px 16px !important; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">🎯</div>
      AgentHunt
    </a>
    <div class="breadcrumb">
      <span>›</span>
      <a href="index.html">全部 Agent</a>
      <span>›</span>
      <span id="breadcrumbName" style="color:var(--text-2)">Agent 详情</span>
    </div>
    <div class="nav-actions" id="navActions">
      <button class="btn btn-ghost" onclick="openModal('auth')">登录</button>
      <button class="btn btn-primary" onclick="openModal('auth')">注册</button>
    </div>
  </div>
</nav>

<!-- HERO BANNER -->
<div class="detail-hero">
  <div class="detail-hero-inner">
    <div class="detail-hero-top">
      <div class="detail-icon" id="detailIcon">🤖</div>
      <div class="detail-meta">
        <div class="detail-badges" id="detailBadges"></div>
        <h1 class="detail-name" id="detailName">Agent 名称</h1>
        <p class="detail-tagline" id="detailTagline">一句话介绍</p>
      </div>
    </div>
    <div class="detail-hero-actions">
      <button class="btn-use" id="useBtn" onclick="handleUse()">
        🚀 立即使用
      </button>
      <button class="vote-hero-btn" id="voteHeroBtn" onclick="handleVote()">
        <span>▲</span>
        <span id="voteHeroCount">0</span>
        <span>支持</span>
      </button>
      <button class="btn-share" onclick="handleShare()">🔗 分享</button>
    </div>
    <div class="screenshot-strip" id="screenshotStrip"></div>
  </div>
</div>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- LEFT: MAIN CONTENT -->
  <div>

    <!-- Description -->
    <div class="section-card">
      <div class="section-title">📖 产品介绍</div>
      <div class="desc-text" id="descText"></div>
      <ul class="feature-list" id="featureList"></ul>
    </div>

    <!-- Use Cases -->
    <div class="section-card">
      <div class="section-title">💡 适用场景</div>
      <div id="useCases" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
    </div>

    <!-- Tags -->

let currentAgent = null;
let currentUser = null;
let voted = false;
let following = false;

function getAgentId() {
  const p = new URLSearchParams(location.search);
  return parseInt(p.get('id')) || 1;
}

function init() {
  // Restore session
  const saved = localStorage.getItem('ah_user');
  if (saved) { currentUser = JSON.parse(saved); updateNavUI(); }

  // Restore voted set
  const savedVotes = JSON.parse(localStorage.getItem('ah_votes') || '[]');
  const id = getAgentId();
  voted = savedVotes.includes(id);

  currentAgent = AGENTS.find(a => a.id === id) || AGENTS[0];
  const extra = AGENT_EXTRA[currentAgent.id] || DEFAULT_EXTRA;

  renderHero(currentAgent);
  renderScreenshots(extra.screenshots, currentAgent.icon);
  renderDescription(currentAgent, extra);
  renderUseCases(extra.useCases);
  renderTags(currentAgent.tags);
  renderComments(extra.comments);
  renderStats(currentAgent, extra);
  renderInfo(currentAgent);
  renderCreator(currentAgent);
  renderRelated(currentAgent);

  document.title = `${currentAgent.name} · AgentHunt`;
  document.getElementById('breadcrumbName').textContent = currentAgent.name;
}

// ─── RENDER FUNCTIONS ──────────────────────────────────────────────────────────
function renderHero(a) {
  document.getElementById('detailIcon').textContent = a.icon;
  document.getElementById('detailName').textContent = a.name;
  document.getElementById('detailTagline').textContent = a.tagline;
  document.getElementById('voteHeroCount').textContent = a.votes;

  const badges = document.getElementById('detailBadges');
  badges.innerHTML = `<span class="detail-badge badge-cat">${a.cat}</span>`;
  if (a.badge === 'featured') badges.innerHTML += `<span class="detail-badge badge-featured">⭐ 精选</span>`;
  if (a.badge === 'hot')      badges.innerHTML += `<span class="detail-badge badge-hot">🔥 HOT</span>`;
  if (a.badge === 'new')      badges.innerHTML += `<span class="detail-badge badge-new">NEW</span>`;

  if (voted) {
    const btn = document.getElementById('voteHeroBtn');
    btn.classList.add('voted');
  }
}

const SCREENSHOT_GRADIENTS = [
  'linear-gradient(135deg,#1e3a5f,#0d1f3c)',
  'linear-gradient(135deg,#1a1a40,#2d1b69)',
  'linear-gradient(135deg,#0a2e1a,#1a5c35)',
  'linear-gradient(135deg,#3a1a00,#7a3800)',
];

function renderScreenshots(labels, icon) {
  const strip = document.getElementById('screenshotStrip');
  strip.innerHTML = labels.map((label, i) => `
    <div class="screenshot-item" onclick="openScreenshot(${i})"
      style="background:${SCREENSHOT_GRADIENTS[i % SCREENSHOT_GRADIENTS.length]}">
      <div class="screenshot-placeholder">
        <div class="icon">${icon}</div>
        <div>${label}</div>
      </div>
    </div>
  `).join('');
}

function renderDescription(a, extra) {
  document.getElementById('descText').innerHTML = `
    <p>${a.desc}</p>

    <li class="feature-item">
      <div class="feature-icon">✓</div>
      <span>${f}</span>

  `).join('');
}

  document.getElementById('useCases').innerHTML = cases.map((c, i) => `
    <div style="background:${colors[i%colors.length]};border-radius:9px;padding:14px;

      <span style="font-size:13px;font-weight:600;color:${textColors[i%textColors.length]}">${c}</span>

function handleVote() {
  if (!currentUser) { openModal('auth'); showToast('登录后才能投票', 'error'); return; }
  const btn = document.getElementById('voteHeroBtn');
  const countEl = document.getElementById('voteHeroCount');
  const savedVotes = JSON.parse(localStorage.getItem('ah_votes') || '[]');

  if (voted) {
    voted = false;
    currentAgent.votes--;
    btn.classList.remove('voted');
    const idx = savedVotes.indexOf(currentAgent.id);
    if (idx > -1) savedVotes.splice(idx, 1);
  } else {
    voted = true;
    currentAgent.votes++;
    btn.classList.add('voted');
    savedVotes.push(currentAgent.id);
    btn.style.transform = 'scale(1.08)';
    setTimeout(() => btn.style.transform = '', 200);
    showToast('感谢支持！', 'success');
  }
  countEl.textContent = currentAgent.votes;
  localStorage.setItem('ah_votes', JSON.stringify(savedVotes));
}

function handleUse() {
  if (currentAgent.url && currentAgent.url !== 'https://example.com') {
    window.open(currentAgent.url, '_blank');
  } else {
    showToast('正在跳转到 Agent 使用页面...');
    setTimeout(() => showToast('演示模式：链接暂未配置'), 1000);
  }
}

function handleShare() {
  const url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('链接已复制到剪贴板 ✓', 'success'));
  } else {
    showToast('链接：' + url);
  }
}

function handleFollow() {
  if (!currentUser) { openModal('auth'); showToast('登录后才能关注', 'error'); return; }
  const btn = document.getElementById('followBtn');
  following = !following;
  btn.textContent = following ? '✓ 已关注' : '+ 关注开发者';
  btn.classList.toggle('following', following);
  showToast(following ? `已关注 ${currentAgent.submitter}` : '已取消关注', following ? 'success' : '');
}

function likeComment(el, id) {
  if (!currentUser) { openModal('auth'); return; }
  const countEl = el.querySelector('span');
  const n = parseInt(countEl.textContent);
  countEl.textContent = n + 1;
  el.style.color = 'var(--brand)';
}

function checkLoginBeforeComment() {
  if (!currentUser) {
    document.getElementById('commentText').blur();
    openModal('auth');
    showToast('登录后才能评论', 'error');
    return;
  }
  document.getElementById('commentActions').style.display = 'flex';
  updateCommentAvatar();
}

function updateCommentAvatar() {
  const el = document.getElementById('commentAvatar');
  if (currentUser) {
    el.className = 'comment-avatar user';
    el.textContent = currentUser.name.charAt(0).toUpperCase();
  }
}

  document.getElementById('commentText').value = '';
  document.getElementById('commentActions').style.display = 'none';
}

function submitComment() {
  const text = document.getElementById('commentText').value.trim();
  if (!text) { showToast('请输入评论内容', 'error'); return; }

  const extra = AGENT_EXTRA[currentAgent.id] || DEFAULT_EXTRA;
  const newComment = {
    id: Date.now(), name: currentUser.name, role: '',
    text, time: '刚刚', likes: 0
  };
  extra.comments.unshift(newComment);
  AGENT_EXTRA[currentAgent.id] = extra;

  cancelComment();
  renderComments(extra.comments);
  showToast('评论已发布', 'success');
}

function searchTag(tag) {
  location.href = `index.html?search=${encodeURIComponent(tag)}`;
}

function openScreenshot(i) {
  showToast('截图预览功能即将上线 🚧');
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  if (!email || !pw) { showToast('请填写邮箱和密码', 'error'); return; }
  loginUser({ name: email.split('@')[0], email });
  closeModal('authModal');
  showToast('登录成功！', 'success');
  updateCommentAvatar();
}

function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw    = document.getElementById('regPassword').value;
  if (!name || !email || !pw) { showToast('请填写所有必填项', 'error'); return; }
  if (pw.length < 8) { showToast('密码至少 8 位', 'error'); return; }
  loginUser({ name, email });
  closeModal('authModal');
  showToast('注册成功！', 'success');
  updateCommentAvatar();
}

function loginUser(user) {
  currentUser = user;
  localStorage.setItem('ah_user', JSON.stringify(user));
  updateNavUI();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('ah_user');
  updateNavUI();
  showToast('已退出登录');
}

function updateNavUI() {
  const el = document.getElementById('navActions');
  if (currentUser) {
    const initial = currentUser.name.charAt(0).toUpperCase();
    el.innerHTML = `
      <div class="nav-user" id="navUser">
        <div class="user-avatar" onclick="toggleDropdown()">${initial}</div>
        <div class="nav-dropdown" id="navDropdown">
          <button class="dropdown-item" onclick="location.href='profile.html'">👤 个人主页</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="logout()">🚪 退出登录</button>
        </div>
      </div>
    `;
  } else {
    el.innerHTML = `
      <button class="btn btn-ghost" onclick="openModal('auth')">登录</button>
      <button class="btn btn-primary" onclick="openModal('auth')">注册</button>
    `;
  }
}

// ─── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(name) {
  document.getElementById(name + 'Modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}
function switchAuthTab(tab) {
  const loginF = document.getElementById('loginForm');
  const regF   = document.getElementById('registerForm');
  const tabs   = document.querySelectorAll('.modal-tab');
  const title  = document.getElementById('authTitle');
  if (tab === 'login') {
    loginF.style.display = ''; regF.style.display = 'none';
    tabs[0].classList.add('active'); tabs[1].classList.remove('active');
    title.textContent = '欢迎回来 👋';
  } else {
    loginF.style.display = 'none'; regF.style.display = '';
    tabs[1].classList.add('active'); tabs[0].classList.remove('active');
    title.textContent = '加入 AgentHunt 🎯';
  }
}

// ─── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function toggleDropdown() {
  const d = document.getElementById('navDropdown');
  if (d) d.classList.toggle('open');
}
document.addEventListener('click', e => {
  const user = document.getElementById('navUser');
  if (user && !user.contains(e.target)) {
    const d = document.getElementById('navDropdown');
    if (d) d.classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal('authModal');
});

init();
</script>
