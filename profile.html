<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人主页 · AgentHunt</title>
  <script>if(window.innerWidth<901){document.write('<style>.sidebar{display:none!important}.profile-body{display:block!important}</style>');}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:    #5B45FF; --brand-lt: #EEF0FF; --brand-dk: #4232CC;
      --orange:   #FF6B35; --green: #22C55E;
      --bg:       #F4F5FA; --surface: #FFFFFF; --border: #E8E9F0;
      --text:     #1A1A2E; --text-2: #5A5A7A; --text-3: #9090A8;
      --shadow:   0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg:0 8px 32px rgba(0,0,0,0.10); --radius: 12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit} button{cursor:pointer;font-family:inherit}

    /* ── NAV ── */
    nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;height:60px}
    .nav-inner{max-width:1100px;margin:0 auto;height:100%;padding:0 24px;display:flex;align-items:center;gap:16px}
    .logo{font-size:18px;font-weight:800;color:var(--brand);display:flex;align-items:center;gap:6px;white-space:nowrap}
    .logo-icon{width:28px;height:28px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .nav-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
    .btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:all .15s}
    .btn-ghost{background:transparent;color:var(--text-2)} .btn-ghost:hover{background:var(--bg)}
    .btn-primary{background:var(--brand);color:#fff} .btn-primary:hover{background:var(--brand-dk);transform:translateY(-1px)}
    .btn-outline{background:transparent;color:var(--brand);border:1.5px solid var(--brand)} .btn-outline:hover{background:var(--brand-lt)}

    /* avatar dropdown */
    .nav-user{position:relative}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
    .user-avatar:hover{border-color:var(--brand-lt)}
    .nav-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);min-width:160px;overflow:hidden;display:none;z-index:200}
    .nav-user .nav-dropdown.open{display:block}
    .dropdown-item{padding:10px 16px;font-size:13px;color:var(--text-2);transition:background .15s;cursor:pointer;display:flex;align-items:center;gap:8px;border:none;background:none;width:100%;text-align:left}
    .dropdown-item:hover{background:var(--bg);color:var(--text)}
    .dropdown-item.danger:hover{background:#FFF0F0;color:#DC2626}
    .dropdown-divider{height:1px;background:var(--border)}

    /* ── PROFILE HEADER ── */
    .profile-hero{background:linear-gradient(135deg,#5B45FF 0%,#8B6FFF 100%);padding:48px 24px 0}
    .profile-hero-inner{max-width:1100px;margin:0 auto}
    .profile-top{display:flex;align-items:flex-end;gap:24px;margin-bottom:0}
    .profile-avatar-wrap{position:relative;flex-shrink:0}
    .profile-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#fff 0%,#e8e8ff 100%);color:var(--brand);font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;border:4px solid rgba(255,255,255,0.4)}
    .avatar-edit-btn{position:absolute;bottom:2px;right:2px;width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid var(--brand-lt);color:var(--brand);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
    .avatar-edit-btn:hover{background:var(--brand);color:#fff}
    .profile-info{flex:1;padding-bottom:20px}
    .profile-name{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
    .profile-bio{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:12px;line-height:1.5}
    .profile-meta{display:flex;gap:16px;flex-wrap:wrap}
    .profile-meta-item{font-size:12px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:4px}
    .profile-actions{display:flex;gap:10px;margin-left:auto;padding-bottom:20px;flex-shrink:0}
    .btn-edit{padding:8px 20px;border-radius:8px;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.35);font-size:13px;font-weight:600;transition:all .15s;backdrop-filter:blur(4px)}
    .btn-edit:hover{background:rgba(255,255,255,.25)}

    /* stats bar */
    .profile-stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.15);margin-top:20px}
    .profile-stat{flex:1;text-align:center;padding:16px 0;cursor:pointer;transition:background .15s}
    .profile-stat:hover{background:rgba(255,255,255,.08)}
    .profile-stat strong{display:block;font-size:20px;font-weight:800;color:#fff}
    .profile-stat span{font-size:11px;color:rgba(255,255,255,.65)}

    /* ── TABS ── */
    .tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:90}
    .tabs-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:0}
    .tab-btn{padding:14px 20px;font-size:14px;font-weight:600;color:var(--text-3);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;cursor:pointer}
    .tab-btn:hover{color:var(--text-2)}
    .tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}

    /* ── BODY ── 移动优先：默认单列 */
    .profile-body{max-width:1100px;margin:0 auto;padding:16px;display:block}
    @media(min-width:901px){.profile-body{padding:28px 24px;display:grid;grid-template-columns:1fr 280px;gap:28px}}

    /* ── AGENT CARDS GRID ── */
    .agents-grid{display:flex;flex-direction:column;gap:12px}
    .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;gap:14px;transition:all .2s;cursor:pointer}
    .agent-card:hover{border-color:var(--brand);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
    .vote-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:40px}
    .vote-btn{width:40px;height:40px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);color:var(--text-2);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .vote-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-lt)}
    .vote-btn.voted{border-color:var(--brand);background:var(--brand-lt);color:var(--brand)}
    .vote-count{font-size:12px;font-weight:700;color:var(--text-2)}
    .card-icon{width:48px;height:48px;border-radius:11px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:var(--bg)}
    .card-body{flex:1;min-width:0}
    .card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
    .card-name{font-size:15px;font-weight:700;color:var(--text)}
    .card-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
    .badge-new{background:#FFF3CD;color:#B45309} .badge-hot{background:#FFE4E1;color:#DC2626} .badge-featured{background:var(--brand-lt);color:var(--brand)}
    .card-desc{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:8px}
    .card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .card-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--text-2);border:1px solid var(--border)}
    .card-meta{margin-left:auto;font-size:11px;color:var(--text-3)}

    /* card actions (only on 我发布的) */
    .card-actions{display:flex;gap:6px;margin-left:auto}
    .btn-card-action{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;border:none;transition:all .15s}
    .btn-card-edit{background:var(--bg);color:var(--text-2);border:1px solid var(--border)} .btn-card-edit:hover{border-color:var(--brand);color:var(--brand)}
    .btn-card-delete{background:#FFF0F0;color:#DC2626} .btn-card-delete:hover{background:#FFE0E0}

    /* status badge */
    .status-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
    .status-pending{background:#FFF3CD;color:#B45309}
    .status-approved{background:#DCFCE7;color:#16A34A}
    .status-rejected{background:#FFE4E1;color:#DC2626}

    /* empty state */
    .empty-state{text-align:center;padding:64px 24px;color:var(--text-3)}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-title{font-size:16px;font-weight:600;color:var(--text-2);margin-bottom:8px}
    .empty-desc{font-size:13px;line-height:1.6;margin-bottom:20px}
    .btn-empty{padding:9px 24px;border-radius:9px;background:var(--brand);color:#fff;border:none;font-size:13px;font-weight:600;transition:all .15s}
    .btn-empty:hover{background:var(--brand-dk);transform:translateY(-1px)}

    /* ── SIDEBAR ── 移动端默认隐藏 */
    .sidebar{display:none;flex-direction:column;gap:18px}
    @media(min-width:901px){.sidebar{display:flex}}
    .sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .sidebar-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}

    /* activity feed */
    .activity-list{display:flex;flex-direction:column;gap:0}
    .activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .activity-item:last-child{border-bottom:none;padding-bottom:0}
    .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .dot-vote{background:var(--brand)} .dot-submit{background:var(--green)} .dot-comment{background:var(--orange)}
    .activity-text{font-size:12px;color:var(--text-2);line-height:1.5}
    .activity-text strong{color:var(--text)}
    .activity-time{font-size:11px;color:var(--text-3);margin-top:2px}

    /* settings form */
    .settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .settings-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px}
    .form-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);background:var(--surface);font-family:inherit;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--brand)}
    .form-input::placeholder{color:var(--text-3)}
    .form-hint{font-size:11px;color:var(--text-3);margin-top:4px}
    .btn-save{padding:9px 24px;border-radius:8px;background:var(--brand);color:#fff;border:none;font-size:13px;font-weight:600;transition:all .15s}
    .btn-save:hover{background:var(--brand-dk);transform:translateY(-1px)}
    .danger-zone{border-color:#FCA5A5}
    .danger-title{color:#DC2626}
    .btn-danger{padding:9px 24px;border-radius:8px;background:#FFF0F0;color:#DC2626;border:1px solid #FCA5A5;font-size:13px;font-weight:600;transition:all .15s}
    .btn-danger:hover{background:#DC2626;color:#fff}

    /* ── EDIT PROFILE MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(10,10,30,.5);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;transform:translateY(20px);transition:transform .2s;overflow:hidden}
    .modal-overlay.open .modal{transform:none}
    .modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-size:18px;font-weight:800}
    .modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);color:var(--text-2);font-size:16px;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{background:var(--border)}
    .modal-body{padding:20px 24px 24px}
    .btn-full{width:100%;padding:11px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;transition:all .15s;margin-top:4px}
    .btn-full:hover{background:var(--brand-dk);transform:translateY(-1px)}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;right:24px;z-index:400;background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:none;opacity:1}
    .toast.success{background:var(--green)} .toast.error{background:#EF4444}

    /* ── FOOTER ── */
    footer{border-top:1px solid var(--border);padding:28px 24px;text-align:center;font-size:12px;color:var(--text-3);margin-top:12px}
    footer a{color:var(--brand)}

    @media(max-width:900px){
      /* Nav */
      .nav-inner{padding:0 16px !important;gap:10px !important}
      #navActions button{padding:6px 10px !important;font-size:12px !important}

      /* Profile hero */
      .profile-hero{padding:28px 16px 0 !important}
      .profile-top{flex-wrap:wrap !important;gap:16px !important}
      .profile-avatar{width:72px !important;height:72px !important;font-size:28px !important}
      .profile-name{font-size:22px !important}
      .profile-actions{flex-wrap:wrap !important;gap:6px !important;margin-top:8px !important}
      .profile-actions .btn-edit{padding:7px 14px !important;font-size:12px !important}
      .profile-stats{flex-wrap:wrap !important}
      .profile-stat{min-width:33% !important}

      /* Body: single column, hide sidebar */
      .profile-body{grid-template-columns:1fr !important;padding:16px !important;gap:20px !important}
      .profile-sidebar{display:none !important}

      /* Tabs */
      .profile-tabs{flex-wrap:wrap !important;gap:4px !important}
      .profile-tab{padding:7px 12px !important;font-size:13px !important}

      /* Cards grid */
      .cards-grid{grid-template-columns:1fr !important}

      /* Footer */
      footer{padding:20px 16px !important}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">🎯</div>AgentHunt
    </a>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<!-- PROFILE HERO -->
<div class="profile-hero">
  <div class="profile-hero-inner">
    <div class="profile-top">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <button class="avatar-edit-btn" onclick="openEditModal()" title="修改头像">✎</button>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="profileName">用户名</div>
        <div class="profile-bio" id="profileBio">这个人很懒，什么都没留下</div>
        <div class="profile-meta">
          <span class="profile-meta-item">📅 <span id="joinDate">2025年加入</span></span>
          <span class="profile-meta-item">📧 <span id="profileEmail">—</span></span>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn-edit" onclick="openEditModal()">✎ 编辑资料</button>
        <a href="index.html"><button class="btn-edit">+ 发布 Agent</button></a>
      </div>
    </div>
    <div class="profile-stats">
      <div class="profile-stat" onclick="switchTab('published')">
        <strong id="statPublished">0</strong>
        <span>已发布</span>
      </div>
      <div class="profile-stat" onclick="switchTab('voted')">
        <strong id="statVoted">0</strong>
        <span>支持过</span>
      </div>
      <div class="profile-stat">
        <strong id="statReceivedVotes">0</strong>
        <span>获得支持</span>
      </div>
      <div class="profile-stat">
        <strong>0</strong>
        <span>关注者</span>
      </div>
    </div>
  </div>
</div>

<!-- TABS BAR -->
<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('published')" id="tab-published">🚀 我发布的</button>
    <button class="tab-btn" onclick="switchTab('voted')" id="tab-voted">▲ 投过票的</button>
    <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings">⚙️ 账号设置</button>
  </div>
</div>

<!-- BODY -->
<div class="profile-body">
  <div id="mainContent"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">📋 最近动态</div>
      <div class="activity-list" id="activityList"></div>
    </div>
    <div class="sidebar-card" id="tipsCard">
      <div class="sidebar-title">💡 开发者提示</div>
      <p style="font-size:13px;color:var(--text-2);line-height:1.7">
        发布高质量 Agent，获得更多社区支持。<br><br>
        完善描述、截图和使用场景，能显著提升曝光率 📈
      </p>
      <a href="index.html">
        <button style="margin-top:14px;width:100%;padding:8px;border-radius:8px;background:var(--brand-lt);color:var(--brand);border:none;font-size:13px;font-weight:600;cursor:pointer">
          + 立即发布 Agent
        </button>
      </a>
    </div>
  </aside>
</div>

<footer>
  <p>© 2025 AgentHunt · <a href="index.html">返回首页</a></p>
</footer>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="editModal" onclick="handleOverlayClick(event,'editModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✎ 编辑资料</span>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;justify-content:center;margin-bottom:20px">
        <div style="position:relative">
          <div id="editAvatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#8B6FFF);color:#fff;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;border:3px solid var(--brand-lt)">U</div>
          <div style="position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #fff">📷</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" type="text" id="editName" placeholder="你的昵称" />
      </div>
      <div class="form-group">
        <label class="form-label">个人简介</label>
        <input class="form-input" type="text" id="editBio" placeholder="一句话介绍自己" />
      </div>
      <div class="form-group">
        <label class="form-label">个人网站</label>
        <input class="form-input" type="url" id="editWebsite" placeholder="https://yoursite.com" />
      </div>
      <button class="btn-full" onclick="saveProfile()">保存修改</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const AGENTS = [
  {id:1,name:'AutoResearch',icon:'🔬',tagline:'自动调研，5分钟生成完整报告',desc:'给它一个主题，自动搜索资料、整理信息、生成结构化研究报告。',cat:'效率',tags:['调研','报告','自动化'],votes:342,badge:'featured',submitter:'张伟',time:'2小时前',status:'approved'},
  {id:2,name:'CodeReview AI',icon:'🛡️',tagline:'自动审查代码，发现潜在问题',desc:'上传代码或输入 GitHub 链接，AI 自动进行安全检查、性能分析。',cat:'编程',tags:['代码审查','安全','GitHub'],votes:287,badge:'hot',submitter:'李明',time:'5小时前',status:'approved'},
  {id:3,name:'WriteFlow',icon:'✍️',tagline:'从灵感到成文，写作全流程 Agent',desc:'支持博客、报告等多种写作场景，大纲生成、内容填充一站式服务。',cat:'写作',tags:['写作','创作','博客'],votes:251,badge:'new',submitter:'王芳',time:'8小时前',status:'approved'},
  {id:4,name:'DataWhiz',icon:'📊',tagline:'上传 Excel，AI 帮你分析出洞察',desc:'无需 SQL 或 Python，上传数据，自然语言提问，自动生成图表。',cat:'数据',tags:['数据分析','可视化','Excel'],votes:198,badge:'',submitter:'赵静',time:'1天前',status:'approved'},
  {id:5,name:'DesignSpark',icon:'🎨',tagline:'描述想法，自动生成 UI 设计稿',desc:'输入产品需求，AI 自动生成高保真 UI 方案，支持导出 Figma 格式。',cat:'设计',tags:['UI设计','Figma','原型'],votes:176,badge:'',submitter:'孙强',time:'1天前',status:'pending'},
  {id:6,name:'SmartCS',icon:'💬',tagline:'24小时在线，智能客服 Agent',desc:'接入产品文档和 FAQ，自动训练专属客服机器人，支持多渠道接入。',cat:'客服',tags:['客服','自动回复','多渠道'],votes:154,badge:'',submitter:'刘洋',time:'2天前',status:'approved'},
  {id:7,name:'MeetingMind',icon:'🎙️',tagline:'会议录音转纪要，自动分配任务',desc:'上传录音或接入 Zoom，自动转写、提取决策、生成任务清单。',cat:'效率',tags:['会议','纪要','任务管理'],votes:143,badge:'new',submitter:'陈晓',time:'2天前',status:'approved'},
  {id:8,name:'SEO Ghost',icon:'🔍',tagline:'分析竞品，生成高排名文章框架',desc:'输入关键词，分析 TOP10 竞品，生成符合 SEO 最佳实践的文章大纲。',cat:'写作',tags:['SEO','内容营销','关键词'],votes:128,badge:'',submitter:'吴明',time:'3天前',status:'approved'},
];

let currentUser = null;
let votedSet = new Set();
let currentTab = 'published';
let profileExtra = {};  // website, etc.

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('ah_user');
  if (!saved) { location.href = 'index.html'; return; }
  currentUser = JSON.parse(saved);

  const savedVotes = JSON.parse(localStorage.getItem('ah_votes') || '[]');
  votedSet = new Set(savedVotes);

  const savedExtra = localStorage.getItem('ah_profile_extra');
  if (savedExtra) profileExtra = JSON.parse(savedExtra);

  renderNav();
  renderProfileHeader();
  renderActivity();
  switchTab('published');
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function renderNav() {
  const el = document.getElementById('navActions');
  const initial = currentUser.name.charAt(0).toUpperCase();
  el.innerHTML = `
    <a href="index.html"><button class="btn btn-outline" style="font-size:13px">+ 发布 Agent</button></a>
    <div class="nav-user" id="navUser">
      <div class="user-avatar" onclick="toggleDropdown()">${initial}</div>
      <div class="nav-dropdown" id="navDropdown">
        <button class="dropdown-item" onclick="location.href='profile.html'">👤 个人主页</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" onclick="logout()">🚪 退出登录</button>
      </div>
    </div>
  `;
}

function logout() {
  localStorage.removeItem('ah_user');
  location.href = 'index.html';
}

// ─── PROFILE HEADER ───────────────────────────────────────────────────────────
function renderProfileHeader() {
  const name = currentUser.name;
  const initial = name.charAt(0).toUpperCase();

  document.getElementById('profileAvatar').textContent = initial;
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileBio').textContent = profileExtra.bio || currentUser.bio || '这个人很懒，什么都没留下 👻';
  document.getElementById('profileEmail').textContent = currentUser.email || '—';
  document.getElementById('joinDate').textContent = '2025年3月加入';
  document.title = `${name} · AgentHunt`;

  // stats
  const myAgents = AGENTS.filter(a => a.submitter === name);
  const votedCount = votedSet.size;
  const totalVotes = myAgents.reduce((s, a) => s + a.votes, 0);

  document.getElementById('statPublished').textContent = myAgents.length;
  document.getElementById('statVoted').textContent = votedCount;
  document.getElementById('statReceivedVotes').textContent = totalVotes;
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  const el = document.getElementById('mainContent');
  if (tab === 'published')  renderPublished(el);
  else if (tab === 'voted') renderVoted(el);
  else if (tab === 'settings') renderSettings(el);
}

// ─── PUBLISHED ────────────────────────────────────────────────────────────────
function renderPublished(el) {
  const myAgents = AGENTS.filter(a => a.submitter === currentUser.name);
  if (myAgents.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🚀</div>
        <div class="empty-title">还没有发布过 Agent</div>
        <div class="empty-desc">把你开发的 AI Agent 发布到 AgentHunt<br>让更多人发现和使用你的作品</div>
        <a href="index.html"><button class="btn-empty">立即发布第一个 →</button></a>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:14px;color:var(--text-2)">共 <strong>${myAgents.length}</strong> 个 Agent</div>
      <a href="index.html"><button style="padding:7px 16px;border-radius:8px;background:var(--brand);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer">+ 新发布</button></a>
    </div>
    <div class="agents-grid">
      ${myAgents.map(a => agentCardHTML(a, true)).join('')}
    </div>`;
}

// ─── VOTED ────────────────────────────────────────────────────────────────────
function renderVoted(el) {
  const votedAgents = AGENTS.filter(a => votedSet.has(a.id));
  if (votedAgents.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">▲</div>
        <div class="empty-title">还没有支持过任何 Agent</div>
        <div class="empty-desc">浏览榜单，为你觉得好用的 Agent 投票<br>帮助更多人发现优质工具</div>
        <a href="index.html"><button class="btn-empty">去发现 Agent →</button></a>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div style="margin-bottom:16px;font-size:14px;color:var(--text-2)">
      共支持了 <strong>${votedAgents.length}</strong> 个 Agent
    </div>
    <div class="agents-grid">
      ${votedAgents.map(a => agentCardHTML(a, false)).join('')}
    </div>`;
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function renderSettings(el) {
  el.innerHTML = `
    <div class="settings-section">
      <div class="settings-title">👤 基本信息</div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" id="setName" value="${currentUser.name}" />
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input class="form-input" id="setEmail" value="${currentUser.email||''}" />
      </div>
      <div class="form-group">
        <label class="form-label">个人简介</label>
        <input class="form-input" id="setBio" value="${profileExtra.bio||''}" placeholder="一句话介绍自己" />
      </div>
      <div class="form-group">
        <label class="form-label">个人网站</label>
        <input class="form-input" id="setWebsite" value="${profileExtra.website||''}" placeholder="https://yoursite.com" />
      </div>
      <button class="btn-save" onclick="saveSettings()">保存修改</button>
    </div>

    <div class="settings-section">
      <div class="settings-title">🔒 修改密码</div>
      <div class="form-group">
        <label class="form-label">当前密码</label>
        <input class="form-input" type="password" id="oldPwd" placeholder="输入当前密码" />
      </div>
      <div class="form-group">
        <label class="form-label">新密码</label>
        <input class="form-input" type="password" id="newPwd" placeholder="至少 8 位" />
        <div class="form-hint">密码长度不少于 8 位</div>
      </div>
      <div class="form-group">
        <label class="form-label">确认新密码</label>
        <input class="form-input" type="password" id="confirmPwd" placeholder="再次输入新密码" />
      </div>
      <button class="btn-save" onclick="changePassword()">修改密码</button>
    </div>

    <div class="settings-section danger-zone">
      <div class="settings-title danger-title">⚠️ 危险操作</div>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:16px;line-height:1.6">
        退出登录后需要重新验证身份才能继续使用。
      </p>
      <button class="btn-danger" onclick="logout()">退出登录</button>
    </div>`;
}

// ─── CARD HTML ─────────────────────────────────────────────────────────────────
function agentCardHTML(a, showActions) {
  const statusMap = { approved: ['status-approved','✓ 已上线'], pending: ['status-pending','⏳ 审核中'], rejected: ['status-rejected','✗ 未通过'] };
  const [statusClass, statusText] = statusMap[a.status] || statusMap['approved'];
  const isVoted = votedSet.has(a.id);

  return `
    <div class="agent-card" onclick="location.href='agent.html?id=${a.id}'">
      <div class="vote-col">
        <button class="vote-btn ${isVoted?'voted':''}" onclick="toggleVote(event,${a.id})" title="投票">▲</button>
        <span class="vote-count" id="vc-${a.id}">${a.votes}</span>
      </div>
      <div class="card-icon">${a.icon}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-name">${a.name}</span>
          ${a.badge==='featured'?'<span class="card-badge badge-featured">⭐ 精选</span>':''}
          ${a.badge==='hot'?'<span class="card-badge badge-hot">🔥 HOT</span>':''}
          ${a.badge==='new'?'<span class="card-badge badge-new">NEW</span>':''}
          ${showActions?`<span class="status-badge ${statusClass}">${statusText}</span>`:''}
        </div>
        <div class="card-desc">${a.tagline}</div>
        <div class="card-footer">
          ${a.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}
          <span class="card-meta">${a.cat} · ${a.time}</span>
          ${showActions ? `
            <div class="card-actions" onclick="event.stopPropagation()">
              <button class="btn-card-action btn-card-edit" onclick="editAgent(${a.id})">编辑</button>
              <button class="btn-card-action btn-card-delete" onclick="deleteAgent(${a.id})">删除</button>
            </div>` : ''}
        </div>
      </div>
    </div>`;
}

// ─── ACTIVITY ─────────────────────────────────────────────────────────────────
function renderActivity() {
  const myAgents = AGENTS.filter(a => a.submitter === currentUser.name);
  const votedIds  = AGENTS.filter(a => votedSet.has(a.id));

  const events = [];
  myAgents.slice(0,2).forEach(a => events.push({ type:'submit', text:`发布了 <strong>${a.name}</strong>`, time: a.time }));
  votedIds.slice(0,3).forEach(a => events.push({ type:'vote', text:`支持了 <strong>${a.name}</strong>`, time: a.time }));
  events.push({ type:'comment', text:'评论了 <strong>AutoResearch</strong>', time: '1天前' });

  events.sort(() => Math.random() - 0.5);

  const dotClass = { submit:'dot-submit', vote:'dot-vote', comment:'dot-comment' };
  document.getElementById('activityList').innerHTML = events.slice(0,6).map(e => `
    <div class="activity-item">
      <div class="activity-dot ${dotClass[e.type]}"></div>
      <div>
        <div class="activity-text">${e.text}</div>
        <div class="activity-time">${e.time}</div>
      </div>
    </div>
  `).join('') || '<div style="font-size:13px;color:var(--text-3);text-align:center;padding:16px">暂无动态</div>';
}

// ─── INTERACTIONS ──────────────────────────────────────────────────────────────
function toggleVote(e, id) {
  e.stopPropagation();
  const agent = AGENTS.find(a => a.id === id);
  const btn = e.currentTarget;
  const countEl = document.getElementById('vc-' + id);

  if (votedSet.has(id)) {
    votedSet.delete(id); agent.votes--;
    btn.classList.remove('voted');
  } else {
    votedSet.add(id); agent.votes++;
    btn.classList.add('voted');
    btn.style.transform = 'scale(1.2)';
    setTimeout(() => btn.style.transform = '', 200);
  }
  countEl.textContent = agent.votes;
  localStorage.setItem('ah_votes', JSON.stringify([...votedSet]));

  document.getElementById('statVoted').textContent = votedSet.size;
  if (currentTab === 'voted') renderVoted(document.getElementById('mainContent'));
}

function editAgent(id) {
  showToast('编辑功能即将上线 🚧');
}

function deleteAgent(id) {
  if (!confirm('确定要删除这个 Agent 吗？此操作不可恢复。')) return;
  const idx = AGENTS.findIndex(a => a.id === id);
  if (idx > -1) AGENTS.splice(idx, 1);
  renderPublished(document.getElementById('mainContent'));
  renderProfileHeader();
  showToast('已删除', 'success');
}

function saveSettings() {
  const name = document.getElementById('setName').value.trim();
  const email = document.getElementById('setEmail').value.trim();
  const bio = document.getElementById('setBio').value.trim();
  const website = document.getElementById('setWebsite').value.trim();
  if (!name) { showToast('昵称不能为空', 'error'); return; }

  currentUser.name = name;
  currentUser.email = email;
  profileExtra = { ...profileExtra, bio, website };
  localStorage.setItem('ah_user', JSON.stringify(currentUser));
  localStorage.setItem('ah_profile_extra', JSON.stringify(profileExtra));
  renderProfileHeader();
  renderNav();
  showToast('保存成功！', 'success');
}

function changePassword() {
  const oldP = document.getElementById('oldPwd').value;
  const newP = document.getElementById('newPwd').value;
  const cfm  = document.getElementById('confirmPwd').value;
  if (!oldP || !newP || !cfm) { showToast('请填写所有密码字段', 'error'); return; }
  if (newP.length < 8) { showToast('新密码至少 8 位', 'error'); return; }
  if (newP !== cfm) { showToast('两次密码不一致', 'error'); return; }
  ['oldPwd','newPwd','confirmPwd'].forEach(id => document.getElementById(id).value = '');
  showToast('密码修改成功！', 'success');
}

// ─── EDIT PROFILE MODAL ───────────────────────────────────────────────────────
function openEditModal() {
  document.getElementById('editName').value = currentUser.name;
  document.getElementById('editBio').value = profileExtra.bio || '';
  document.getElementById('editWebsite').value = profileExtra.website || '';
  document.getElementById('editAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  openModal('editModal');
}

function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const bio  = document.getElementById('editBio').value.trim();
  const site = document.getElementById('editWebsite').value.trim();
  if (!name) { showToast('昵称不能为空', 'error'); return; }
  currentUser.name = name;
  profileExtra = { ...profileExtra, bio, website: site };
  localStorage.setItem('ah_user', JSON.stringify(currentUser));
  localStorage.setItem('ah_profile_extra', JSON.stringify(profileExtra));
  closeModal('editModal');
  renderProfileHeader();
  renderNav();
  showToast('资料已更新！', 'success');
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function handleOverlayClick(e, id) { if (e.target===document.getElementById(id)) closeModal(id); }
function toggleDropdown() {
  const d = document.getElementById('navDropdown');
  if (d) d.classList.toggle('open');
}
document.addEventListener('click', e => {
  const user = document.getElementById('navUser');
  if (user && !user.contains(e.target)) {
    const d = document.getElementById('navDropdown');
    if (d) d.classList.remove('open');
  }
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal('editModal'); });

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>

</html>
